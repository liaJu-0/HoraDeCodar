<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hora de codar 4 - Lógica 3</title>
</head>
<body>
<!-- 3 - Compras. Vamos criar uma lista de compras. Crie uma array de frutas, exiba-a ao usuário e, em seguida, peça ao usuário para digitar o nome de uma das frutas. Caso a fruta esteja no array, remova-a e exiba a mensagem "Fruta foi retirada da lista". Peça novamente para o usuário digitar o nome de uma fruta para ser removida. Sempre que o usuário procurar por uma fruta que não está no array exiba a mensagem "Fruta indisponível no nosso mercado". Quando o array não possuir mais itens dentro de si, escreva "Lista de compras finalizada".-->
    <script>
        var frutas = ["Maça", "Banana", "Laranja", "Uva", "Abacaxi"];
        while(frutas.length > 0){
            var fruta = prompt("Frutas disponiveis: " + frutas.join(", ") + " Digite o nome da fruta desejada:");
            if(frutas.includes(fruta)){
                frutas.splice(frutas.indexOf(fruta), 1);
                alert("Fruta retirada da lista");
            } else {
                alert("Fruta indisponível");
            }
        }
    </script>
</body>
</html>
