<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hora de codar 4 - Lógica 1</title>
</head>
<body>
<!-- 1 - Estudantes. Crie um programa onde o usuário possa cadastrar estudantes sem limites, e, em seguida, Se o usuário digitar "PARE" o programa deve exibir a quantidade de estudantes cadastrados e a lista com cada um deles. -->
    <script>
        let estudantes = [];
        let estudante = "";
        while(estudante != "PARE" && estudante != "pare"){
            estudante = prompt("Informe o nome do estudante (ou digite 'PARE' para finalizar):");
            estudantes.push(estudante);
        }
        alert('Quantidade de estudantes cadastrados: ' + estudantes.length);

    </script>
</body>
</html>
