<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hora de codar 2 - Lógica 10</title>
</head>
<body>
<!--10. Tendo como entrada a altura e o gênero designado ao nascer (codificado da seguinte forma: 1: feminino - 2: masculino - ) de uma pessoa, construa um programa que calcule e imprima seu peso ideal, utilizando as seguintes fórmulas. homem: (72.7*h)-58 mulher: (62.1*h)-44.7-->    
    <h1>Calculadora de peso ideal</h1>
    <form id="peso-ideal-form">
        <label for="altura">Altura (em metros):</label>
        <input type="number" id="altura" name="altura" step="0.01" required><br><br>

        <label for="genero">Gênero designado ao nascer:</label>
        <select id="genero" name="genero" required>
            <option value="">Selecione</option>
            <option value="1">Feminino</option>
            <option value="2">Masculino</option>
        </select><br><br>

        <button type="submit">Calcular Peso Ideal</button>
    </form>

    <p id="resultado"></p>

    <script>
        document.getElementById('peso-ideal-form').addEventListener('submit', function(event) {
            event.preventDefault();

            const altura = parseFloat(document.getElementById('altura').value);
            const genero = document.getElementById('genero').value;
            let pesoIdeal;

            if (genero === '1') { // Feminino
                pesoIdeal = (62.1 * altura) - 44.7;
            } else if (genero === '2') { // Masculino
                pesoIdeal = (72.7 * altura) - 58;
            } else {
                document.getElementById('resultado').textContent = 'Por favor, selecione um gênero válido.';
                return;
            }

            document.getElementById('resultado').textContent = `O peso ideal é: ${pesoIdeal.toFixed(2)} kg`;
        });
    </script>
</body>
</html>
