<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hora de codar 2 - Lógica 11</title>
</head>
<body>
<!--11. Uma micro calculadora
Escreva um programa para ler 2 valores inteiros informados pelo usuário e uma das seguintes operações a serem executadas (codificada da seguinte forma: 1. Adição, 2. Subtração, 3. Divisão, 4. Multiplicação).
O programa deve calcular e escrever o resultado dessa operação sobre os dois valores lidos. 
Observação: Considere que só serão lidos os valores 1, 2, 3 ou 4 para as operações-->
  <h2>Micro Calculadora</h2>

  <form>
    <label>Valor 1: <input type="number" id="v1"></label><br><br>
    <label>Valor 2: <input type="number" id="v2"></label><br><br>
    <label>Operação (1=Adição, 2=Subtração, 3=Divisão, 4=Multiplicação): 
      <input type="number" id="op"></label><br><br>
    <button type="button" onclick="calcular()">Calcular</button>
  </form>

  <h3>Resultado:</h3>
  <p id="resultado"></p>

  <script>
    function calcular() {
      var v1 = Number(document.getElementById("v1").value);
      var v2 = Number(document.getElementById("v2").value);
      var op = Number(document.getElementById("op").value);

      var resultado;

      if (op === 1) {
        resultado = v1 + v2;
      } else if (op === 2) {
        resultado = v1 - v2;
      } else if (op === 3) {
        resultado = v1 / v2;
      } else if (op === 4) {
        resultado = v1 * v2;
      } else {
        resultado = "Operação inválida. Use 1, 2, 3 ou 4.";
      }

      document.getElementById("resultado").innerText = "Resultado: " + resultado;
    }
  </script>
</body>
</html>
