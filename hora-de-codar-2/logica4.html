<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hora de codar 2 - Lógica 4</title>
</head>
<body>
<!--4. Faça um programa que leia 3 valores informados pelo usuário (considere que não serão informados valores iguais) e escrever a soma dos 2 maiores.-->
    <h2>Informe 3 valores diferentes:</h2>

  <form>
    <label>Valor 1: <input type="number" id="val1" required></label><br><br>
    <label>Valor 2: <input type="number" id="val2" required></label><br><br>
    <label>Valor 3: <input type="number" id="val3" required></label><br><br>
    <button type="button" onclick="calcularNum()">Resultado</button>
  </form>

  <h3>Resultado da soma dos 2 maiores:</h3>
  <p id="resultado"></p>

    <script>
        function calcularNum() {
            var v1 = Number(document.getElementById("val1").value);
            var v2 = Number(document.getElementById("val2").value);
            var v3 = Number(document.getElementById("val3").value);

            var maior1 = Math.max(v1, v2, v3);
            var menor = Math.min(v1, v2, v3);
            var soma = v1 + v2 + v3 - maior1 - menor;

            document.getElementById("resultado").innerText =
                "A soma dos 2 maiores valores é: " + (maior1 + soma);
        }
    </script>
</body>
</html>
