<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hora de codar 2 - Lógica 1</title>
</head>
<body>
<!-- 1. Escreva um programa em que o usuário informe dois números. Então escreva em tela o maior deles. -->
    <script>
        let num1 = prompt("Informe o primeiro número:");
        let num2 = prompt("Informe o segundo número:");

        if (num1 > num2) {
            alert("O maior número é: " + num1);
        } else {
            alert("O maior número é: " + num2);
        }
    </script>


</body>
</html>
