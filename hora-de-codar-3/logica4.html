<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hora de codar 3 - Lógica 4</title>
</head>
<body>
<!--4 - Faça um algoritmo que calcule e escreva a média aritmética dos números inteiros entre 15 (inclusive) e 100 (inclusive).-->
<h2>Cálculo da média aritmética (15 a 100):</h2>
  
  <button type="button" onclick="calcularMediaFixa()">Calcular Média</button>

  <h3>Resultado:</h3>
  <p id="resultado"></p>

  <script>
    function calcularMediaFixa() {
      var soma = 0;
      var quantidade = 0;

      for (var i = 15; i <= 100; i++) {
        soma += i;
        quantidade++;
      }

      var media = soma / quantidade;

      document.getElementById("resultado").innerText = "A média aritmética entre 15 e 100 é: " + media.toFixed(2);
    }
  </script>
</body>
</html>
