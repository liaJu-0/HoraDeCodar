<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hora de codar 3 - Lógica 6</title>
</head>
<body>
<!--6 - Escreva um programa para ler 2 notas de um aluno, calcular e imprimir a média final. Considere que a nota de aprovação é 9,5. Logo após escrever a mensagem "Calcular a média de outro aluno Sim/Não?" e solicitar um resposta. Se a resposta for "S", o programa deve ser executado novamente, caso contrário deve ser encerrado exibindo a quantidade de alunos aprovados.-->
<h1>Controle de Notas e Aprovação</h1>
<button onclick="iniciarSistema()">Iniciar Lançamento de Notas</button>

<p id="resultadoFinal"></p>

<script>
    function iniciarSistema() {
        let aprovados = 0;
        let continuar = "S";

        while (continuar.toUpperCase() === "S") {
            let n1 = parseFloat(prompt("Informe a primeira nota:"));
            let n2 = parseFloat(prompt("Informe a segunda nota:"));
            
            let media = (n1 + n2) / 2;

            if (media >= 9.5) {
                alert("Média: " + media.toFixed(2) + " - Aluno aprovado");
                aprovados++;
            } else {
                alert("Média: " + media.toFixed(2) + " - Aluno reprovado.");
            }

            continuar = prompt("Calcular a média de outro aluno Sim(S)/Não(N)?");
        }

        document.getElementById("resultadoFinal").innerText = "Total de alunos aprovados: " + aprovados;
    }
</script>

</body>
</html>
