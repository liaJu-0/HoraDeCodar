<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hora de codar 3 - Lógica 2</title>
</head>
<body>
<!--2 - Escreva um algoritmo para ler 2 valores informados pelo usuário e enquanto o segundo valor informado for igual ou menor que ZERO, deve ser lido um novo valor, mas para a mesma variável. Ou seja, para o segundo valor não pode ser aceito o valor zero nem um valor negativo. 
O seu programa deve imprimir o resultado da divisão do primeiro valor lido pelo segundo valor e exibir o resultado ao usuário.-->
<h2>Calculadora de Divisão</h2>
    <form id="valoresForm">
        <label>Valor 1: <input type="number" id="v1" required></label><br><br>
        <label>Valor 2: <input type="number" id="v2" required></label><br><br>
        <button type="button" onclick="calcularDivisao()">Enviar</button>
    </form>
    <h3>Resultado:</h3>
    <p id="resultado"></p>
    <script>
        function calcularDivisao() {
            var v1 = Number(document.getElementById("v1").value);
            var v2 = Number(document.getElementById("v2").value);

            while (v2 <= 0) {
                v2 = parseFloat(prompt("Valor inválido! Informe um novo segundo valor (deve ser maior que zero):"));
            }

            var resultado = v1 / v2;
            document.getElementById("resultado").innerText = "Resultado da divisão: " + resultado;
        }
    </script>
</body>
</html>
