<!--9 - Escreva um algoritmo para imprimir os 10 primeiros números inteiros maiores que 100.-->
<h1>Resultado no console</h1>
    <script>
        console.log("Os 10 primeiros números inteiros maiores que 100:");

        // Começamos em 101 e contamos 10 números
        for (let i = 101; i <= 110; i++) {
            console.log(i);
        }
    </script>
