<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hora de codar 3 - Lógica 1</title>
</head>
<body>
<!--1 - Crie uma bomba relógio (usando somente código - para deixar claro!) cuja contagem regressiva vá de 30 a 0. No final da repetição escreva "EXPLOSÃO".-->
<h1>Resultado no console</h1>
    <script>
        for (let i = 30; i >= 0; i--) {
            console.log(i);
        }

        console.log("EXPLOSÃO!!!");
    </script>
</body>
</html>
